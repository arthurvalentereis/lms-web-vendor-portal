  <title>Portal Comercial Letmesee</title>
  <script>
    (function () {
      try {
        var theme = localStorage.getItem("vendor-portal-theme");
        var isDark =
          theme === "dark" ||
          (theme !== "light" &&
            window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (isDark) document.documentElement.classList.add("dark");
      } catch (e) { }
    })();
  </script>
